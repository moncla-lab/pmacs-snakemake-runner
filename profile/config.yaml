"""
This yaml file includes a lot of comments in the hopes that it will help users understand 
how to use and edit this file for their own analyses. This file was originally generated 
as a generic pMACs profile that should enable users to run Snakemake pipelines on pMACs, 
while taking advantage of the computing infrastructure to maximize efficiency. This yaml 
does not include specifications for particular workflows. For example, a SARS-CoV-2 
nextstrain build would likely require different specifications than running 1000 replicates
of a TreeSort pipeline, and those specifications should be declared in a separate profile, or 
as a command line flag. This profile simply includes information and commands to facilitate
pMACs specific usage. It is therefore not sufficient for every pipeline, nor will it 
help for pipelines run anywhere other than pMACs (e.g., Beiting server, AWS, etc..). 

In order to make this file maximally descriptive, we have included below a series of 
explanations for each line in this file, along with information on whether it is 
necessary, should ever be changed, and what it is specifying. 

executor: `cluster-generic` is the name if a particular Snakemake plugin 
(https://snakemake.github.io/snakemake-plugin-catalog/plugins/executor/cluster-generic.html), 
which is a generic cluster executor. Executors provide information on how to process jobs.
This line specifies to read in this particular executor and use it. This cluster generic 
executor allows users to write their own scripts designating how jobs should be started, 
stopped, and logged, making it very flexible. That information is documented here in the 
`cluster-generic-submit-cmd` block, below. 

Snakemake also has specific slurm and batch cluster executors, but these did not perform 
well when Stephen tested them out. So we have settled on this one instead. 

This line is absolutely necessary and should not be removed or altered. 


-J: when a particular job is running, give it name equal to rule + wildcard, which will be
displayed in the queue 
-q: this specifies the particular queue you want to use on pmacs. Here, we use normal queue. 
If you needed a GPU or higher memory queue, this could change. 
-R: specifies resources. the `span[hosts=1]` means only request 1 compute node (here a host
is a compute node). For our lab we will probably never need to change this. 

-M sets a per-process memory limit for the job. By default this is a soft limit; append !
(e.g. -M 4096!) to make it a hard limit that kills the job immediately on exceed
(https://www.ibm.com/docs/en/spectrum-lsf/10.1.0?topic=o-m).
-R "rusage[mem=...]" tells the scheduler how much memory to reserve when placing the job,
ensuring the node has enough RAM before the job starts
(https://www.ibm.com/docs/en/spectrum-lsf/10.1.0?topic=o-r).
We set both to the same value so the job is scheduled on a capable node AND constrained
from exceeding that allocation.

"""

executor: cluster-generic

cluster-generic-submit-cmd: >-
  ~/pmacs-snakemake-runner/profile/lsf_submit.sh
  -J {rule}_{wildcards}
  -q normal
  -n {threads}
  -M {resources.mem_mb}
  -R "rusage[mem={resources.mem_mb}]"
  -R "span[hosts=1]"
  -o ~/logs/{rule}_{wildcards}.out
  -e ~/logs/{rule}_{wildcards}.err

cluster-generic-status-cmd:  ~/pmacs-snakemake-runner/profile/lsf_status.sh {job_id}

cluster-generic-cancel-cmd: bkill {job_id}

"""This is another necessary feature that you should not alter. This is necessary because 
pMACs uses a network file system, meaning that files that are created on a compute node 
will get mirrored onto the head node. This can cause problems if there is a discrepancy 
between the nodes in terms of which files are created, which can make Snakemake think 
that a rule isn't complete. For example, a rule ran on a compute node, and another job is
queued up on another compute node, but does not see the output file. This rule/job could 
error, when the file has simply been delayed. This latency instructs Snakemake it pause 
for a maximum of 60 seconds for the file to arrive."""

latency-wait: 60


"""Optional specifications that we are not using at this time. 

You can also specify things like default memory or default jobs. Here, we have opted not to 
do so, since the jobs we run on pmacs are so varied. However, you could specify that you want 
to run 10 concurrent jobs with default memory of 1000 megabytes and 1 thread as follows: 

jobs: 10

default-resources:
  mem_mb: 1000
  threads: 1

"""

